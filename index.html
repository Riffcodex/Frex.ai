<!DOCTYPE html>
<html>
<head>
    <title>Frex AI</title>
    <meta charset="UTF-8">
    <style>
        body{font-family:Arial;max-width:600px;margin:40px auto;padding:20px;background:#f5f5f5}
        #chat{border:2px solid #ddd;height:400px;overflow-y:scroll;padding:10px;margin:10px 0;background:white;border-radius:10px}
       .user{text-align:right;color:#0066cc;margin:8px 0}
       .ai{text-align:left;color:#009900;margin:8px 0}
        input{width:75%;padding:12px;border:2px solid #ddd;border-radius:5px}
        button{padding:12px 20px;background:#0066cc;color:white;border:none;border-radius:5px;cursor:pointer}
    </style>
</head>
<body>
    <h1>Frex AI</h1>
    <div id="chat"></div>
    <input id="pesan" placeholder="Tanya Frex AI..." />
    <button onclick="gas()">Kirim</button>

<script>
const API_KEY = "AQ.Ab8RN6IIvQkrp4_uwKaGdc28NDdDnzifyQpQllGAnprCkzP1MA";

async function gas() {
    const input = document.getElementById('pesan');
    const chat = document.getElementById('chat');
    const teks = input.value;
    if (!teks) return;

    chat.innerHTML += `<div class="user">Lu: ${teks}</div>`;
    input.value = '';
    chat.innerHTML += `<div class="ai">Frex AI: Mikir...</div>`;
    chat.scrollTop = chat.scrollHeight;

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            contents: [{ parts: [{ text: teks }] }]
        })
    });

    const data = await res.json();
    const jawab = data.candidates[0].content.parts[0].text;

    chat.removeChild(chat.lastChild);
    chat.innerHTML += `<div class="ai">Frex AI: ${jawab}</div>`;
    chat.scrollTop = chat.scrollHeight;
}

document.getElementById('pesan').onkeypress = e => { if(e.key==='Enter') gas() };
</script><script>
const API_KEY = "AQ.Ab8RN6IIvQkrp4_uwKaGdc28NDdDnzifyQpQllGAnprCkzP1MA";

async function kirimKeFrexAI(pesanUser) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
    
    const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            contents: [{ parts: [{ text: pesanUser }] }]
        })
    });

    const data = await response.json();
    return data.candidates[0].content.parts[0].text;
}

// CONTOH PAKE: Ganti id button sama input lu
document.getElementById('tombolKirim').onclick = async () => {
    const input = document.getElementById('inputPesan');
    const chatBox = document.getElementById('chatContainer'); // ganti sama id div chat lu
    
    const pesan = input.value;
    if (!pesan) return;
    
    chatBox.innerHTML += `<div class="user">Lu: ${pesan}</div>`;
    input.value = '';
    
    chatBox.innerHTML += `<div class="ai">Frex AI: Mikir...</div>`;
    const jawaban = await kirimKeFrexAI(pesan);
    
    chatBox.removeChild(chatBox.lastChild);
    chatBox.innerHTML += `<div class="ai">Frex AI: ${jawaban}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;
};
</script>
</body>
</html>
